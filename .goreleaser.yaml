version: 2

project_name: grosz

before:
  hooks:
    - go mod tidy

builds:
  - id: grosz
    main: ./cmd/grosz
    binary: grosz
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: bin
    ids:
      - grosz
    formats:
      - binary
    name_template: 'grosz_{{ .Version }}_linux_{{ .Arch }}'

  - id: tarball
    ids:
      - grosz
    formats:
      - tar.gz
    name_template: 'grosz_{{ .Version }}_linux_{{ .Arch }}'
    files:
      - LICENSE
      - README.md

nfpms:
  - id: linux-pkgs
    ids:
      - grosz
    package_name: grosz
    vendor: consi
    homepage: https://github.com/consi/grosz
    maintainer: consi
    description: OCPP Charger Manager for MyEnergi Zappi2
    license: Elastic-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    file_name_template: 'grosz_{{ .Version }}_linux_{{ .Arch }}'
    contents:
      - src: ./packaging/grosz.service
        dst: /lib/systemd/system/grosz.service
        file_info:
          mode: 0644
    scripts:
      postinstall: ./packaging/postinstall.sh
      preremove: ./packaging/preremove.sh

dockers_v2:
  - id: grosz
    ids:
      - grosz
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    images:
      - ghcr.io/consi/grosz
    tags:
      - '{{ .Version }}'
      - 'v{{ .Version }}'
      - latest
    labels:
      org.opencontainers.image.title: grosz
      org.opencontainers.image.description: OCPP Charger Manager for MyEnergi Zappi2
      org.opencontainers.image.source: https://github.com/consi/grosz
      org.opencontainers.image.version: '{{ .Version }}'
      org.opencontainers.image.revision: '{{ .FullCommit }}'
      org.opencontainers.image.licenses: Elastic-2.0

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}'

release:
  github:
    owner: consi
    name: grosz
  draft: false
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
