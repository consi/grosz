name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Test
        run: go test -race -count=1 ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.6

  build-arm64-smoke:
    name: build-arm64-smoke
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build (arm64)
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
        run: go build -trimpath -ldflags "-s -w" -o /tmp/grosz ./cmd/grosz
